<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Görev Sayaç" />
  <meta name="theme-color" content="#0f172a" />
  <title>Görev Sayaç</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f172a'/><circle cx='50' cy='52' r='28' fill='none' stroke='%2338bdf8' stroke-width='6'/><line x1='50' y1='52' x2='50' y2='32' stroke='%2338bdf8' stroke-width='5' stroke-linecap='round'/><line x1='50' y1='52' x2='64' y2='60' stroke='%23f472b6' stroke-width='5' stroke-linecap='round'/><circle cx='50' cy='52' r='4' fill='%2338bdf8'/><rect x='38' y='18' width='24' height='6' rx='3' fill='%2338bdf8'/></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f172a'/><circle cx='50' cy='52' r='28' fill='none' stroke='%2338bdf8' stroke-width='6'/><line x1='50' y1='52' x2='50' y2='32' stroke='%2338bdf8' stroke-width='5' stroke-linecap='round'/><line x1='50' y1='52' x2='64' y2='60' stroke='%23f472b6' stroke-width='5' stroke-linecap='round'/><circle cx='50' cy='52' r='4' fill='%2338bdf8'/><rect x='38' y='18' width='24' height='6' rx='3' fill='%2338bdf8'/></svg>" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-deep:    #0f172a;
      --bg-card:    #1e293b;
      --bg-input:   #162032;
      --accent-sky: #38bdf8;
      --accent-grn: #4ade80;
      --accent-red: #f87171;
      --text-main:  #e2e8f0;
      --text-muted: #64748b;
      --border:     #1e3a5f;
      --radius:     14px;
      --font-head:  'Sora', sans-serif;
      --font-mono:  'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: var(--font-head);
      height: 100dvh;
      overflow: hidden;
    }

    .app-wrapper {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── HEADER ── */
    .app-header {
      background: linear-gradient(135deg, #0c1a2e 0%, #162032 100%);
      border-bottom: 1px solid var(--border);
      padding: max(env(safe-area-inset-top), 14px) 20px 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .app-header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .app-header h1 span { color: var(--accent-sky); }
    .task-count-badge {
      background: var(--accent-sky);
      color: var(--bg-deep);
      font-family: var(--font-mono);
      font-size: .68rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
    }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-area::-webkit-scrollbar { width: 3px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 4px; }

    /* ── SECTION LABELS ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 14px 16px 5px;
      font-size: .67rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .section-label.lbl-done    { color: #4ade8099; }
    .section-label.lbl-running { color: #f8717199; }
    .section-label.lbl-idle    { color: #64748b; }

    /* ── TASK GROUP ── */
    .task-group {
      padding: 5px 14px 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .task-group:last-child { padding-bottom: 14px; }

    /* ── TASK CARD ── */
    .task-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 10px 8px 13px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: slideIn .22s ease;
      transition: border-color .2s;
    }
    .task-item.state-done    { border-color: #14532d44; background: #052e1618; }
    .task-item.state-running { border-color: #7f1d1d55; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TOP ROW (timer + title + delete) ── */
    .task-top {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    /* ── TITLE AREA ── */
    .task-title-wrap { flex: 1; min-width: 0; }
    .task-title {
      font-size: .92rem;
      font-weight: 600;
      line-height: 1.35;
      word-break: break-word;
      color: var(--text-main);
      cursor: pointer;
    }
    .task-title.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    /* inline title edit */
    .task-title-input {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid var(--accent-sky);
      border-radius: 7px;
      color: var(--text-main);
      font-family: var(--font-head);
      font-size: .9rem;
      font-weight: 600;
      padding: 4px 9px;
      outline: none;
    }

    /* ── BOTTOM ROW (note input + save + delete) ── */
    .task-bottom {
      display: flex;
      align-items: center;
      gap: 7px;
      padding-left: 2px;
    }

    .note-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      color: var(--text-main);
      font-family: var(--font-head);
      font-size: .78rem;
      padding: 5px 10px;
      outline: none;
      transition: border-color .2s;
      min-width: 0;
    }
    .note-input::placeholder { color: #3a5070; }
    .note-input:focus { border-color: #38bdf855; }
    /* dirty = değişti ama kaydedilmedi */
    .note-input.dirty { border-color: #f472b655; }

    /* ── ICON BUTTONS ── */
    .btn-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1.5px solid #2a3a50;
      background: transparent;
      font-size: .7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .18s, color .18s, background .18s;
      color: var(--text-muted);
    }
    .btn-icon.note-save            { border-color: #1e3a5f; color: #3a5070; }
    .btn-icon.note-save.dirty      { border-color: var(--accent-sky); color: var(--accent-sky); }
    .btn-icon.note-save.dirty:hover{ background: rgba(56,189,248,.1); }
    .btn-icon.note-save.saved      { border-color: var(--accent-grn); color: var(--accent-grn); }
    .btn-icon.del:hover            { border-color: var(--accent-red); color: var(--accent-red); background: rgba(248,113,113,.08); }

    /* ── TITLE EDIT button (small pencil top-right of title) ── */
    .btn-title-edit {
      background: none;
      border: none;
      color: #2a3a50;
      font-size: .7rem;
      cursor: pointer;
      padding: 2px 4px;
      flex-shrink: 0;
      transition: color .15s;
    }
    .btn-title-edit:hover { color: var(--accent-sky); }

    /* ── TIMER BUTTON ── */
    .btn-timer {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, box-shadow .2s;
    }
    .btn-timer:active { transform: scale(.88); }
    .btn-timer i { font-size: 1rem; }

    .btn-timer.idle { background: #1e3a5f; color: var(--accent-sky); }
    .btn-timer.idle:hover { background: #1e4a7f; box-shadow: 0 0 12px rgba(56,189,248,.25); }

    .btn-timer.running {
      background: var(--accent-red);
      color: #fff;
      animation: pulse-red 1.6s infinite;
    }
    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 4px rgba(248,113,113,.3); }
      50%      { box-shadow: 0 0 14px rgba(248,113,113,.65); }
    }

    .btn-timer.done {
      background: var(--accent-grn);
      color: #052e16;
      animation: pulse-grn 2s infinite;
    }
    @keyframes pulse-grn {
      0%,100% { box-shadow: 0 0 4px rgba(74,222,128,.3); }
      50%      { box-shadow: 0 0 14px rgba(74,222,128,.65); }
    }

    /* ── COUNTDOWN (başlık satırında, ikonun yanında) ── */
    .task-countdown {
      font-family: var(--font-mono);
      font-size: .82rem;
      font-weight: 700;
      color: var(--accent-red);
      letter-spacing: .02em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .task-countdown.done { color: var(--accent-grn); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 70px 20px;
      color: var(--text-muted);
    }
    .empty-state i { font-size: 2.8rem; margin-bottom: 14px; color: #1e3a5f; display: block; }
    .empty-state p { font-size: .87rem; line-height: 1.7; }

    /* ── BOTTOM ADD BAR ── */
    .bottom-bar {
      flex-shrink: 0;
      background: #111f35;
      border-top: 1px solid var(--border);
      padding: 10px 14px max(env(safe-area-inset-bottom), 10px);
      display: flex;
      gap: 9px;
      align-items: center;
    }
    .add-input {
      flex: 1;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-main);
      font-family: var(--font-head);
      font-size: .9rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .add-input:focus { border-color: var(--accent-sky); }
    .add-input::placeholder { color: var(--text-muted); }
    .btn-add {
      background: var(--accent-sky);
      border: none;
      border-radius: var(--radius);
      color: var(--bg-deep);
      font-size: 1rem;
      font-weight: 700;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-add:hover  { background: #7dd3fc; }
    .btn-add:active { transform: scale(.9); }

    /* ── TOAST ── */
    .toast-wrap {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      pointer-events: none;
    }
    .toast-msg {
      background: var(--accent-grn);
      color: #052e16;
      font-weight: 700;
      font-size: .82rem;
      padding: 9px 18px;
      border-radius: 30px;
      white-space: nowrap;
      animation: toastIn .3s ease, toastOut .4s ease 2.4s forwards;
    }
    @keyframes toastIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { to   { opacity:0; transform:translateY(6px); } }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- HEADER -->
  <div class="app-header">
    <h1><i class="fa-solid fa-hourglass-half me-2" style="color:var(--accent-sky);font-size:.9rem;"></i>Görev <span>Sayaç</span></h1>
    <span class="task-count-badge" id="countBadge">0 görev</span>
  </div>

  <!-- SCROLL -->
  <div class="scroll-area">
    <div id="taskList"></div>
  </div>

  <!-- BOTTOM ADD BAR -->
  <div class="bottom-bar">
    <input class="add-input" id="taskInput" type="text" placeholder="Yeni görev ekle…" maxlength="120" autocomplete="off" />
    <button class="btn-add" id="addBtn" title="Ekle"><i class="fa-solid fa-plus"></i></button>
  </div>

</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ── STORAGE ───────────────────────────────────────────────────────────
const STORAGE_KEY = 'gorev_sayac_v3';
function loadTasks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

// ── STATE ─────────────────────────────────────────────────────────────
let tasks = loadTasks();
const intervals = {};
const DURATION  = 5 * 60 * 60;

// ── HELPERS ───────────────────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function fmtTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}s${String(m).padStart(2,'0')}d`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function computeRemaining(task) {
  if (!task.startedAt) return task.remaining ?? DURATION;
  const elapsed = Math.floor((Date.now() - task.startedAt) / 1000);
  return Math.max(0, (task.remaining ?? DURATION) - elapsed);
}

function showToast(msg) {
  const wrap = document.getElementById('toastWrap');
  const el   = document.createElement('div');
  el.className   = 'toast-msg';
  el.textContent = msg;
  wrap.innerHTML = '';
  wrap.appendChild(el);
  setTimeout(() => { if (wrap.contains(el)) wrap.removeChild(el); }, 2900);
}

function vibrate() {
  if ('vibrate' in navigator) navigator.vibrate([200,100,200]);
}

// ── GROUP & SORT ──────────────────────────────────────────────────────
function groupTasks() {
  const done    = tasks.filter(t => t.timerState === 'done');
  const running = tasks
    .filter(t => t.timerState === 'running')
    .sort((a,b) => computeRemaining(a) - computeRemaining(b));
  const idle    = tasks
    .filter(t => !t.timerState || t.timerState === 'idle')
    .sort((a,b) => (a.addedAt||0) - (b.addedAt||0));
  return { done, running, idle };
}

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  const list  = document.getElementById('taskList');
  const badge = document.getElementById('countBadge');

  badge.textContent = tasks.length === 0 ? '0 görev'
    : tasks.length === 1 ? '1 görev' : `${tasks.length} görev`;

  list.innerHTML = '';

  if (tasks.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <i class="fa-regular fa-clock"></i>
      <p>Henüz görev yok.<br/>Aşağıdan yeni bir görev ekleyin.</p>
    </div>`;
    return;
  }

  const { done, running, idle } = groupTasks();

  function addSection(items, cls, icon, label) {
    if (!items.length) return;
    const lbl = document.createElement('div');
    lbl.className = `section-label ${cls}`;
    lbl.innerHTML = `<i class="${icon}" style="font-size:.65rem;"></i> ${label} (${items.length})`;
    list.appendChild(lbl);
    const grp = document.createElement('div');
    grp.className = 'task-group';
    items.forEach(t => grp.appendChild(buildItem(t)));
    list.appendChild(grp);
  }

  addSection(done,    'lbl-done',    'fa-solid fa-circle-check', 'Tamamlandı');
  addSection(running, 'lbl-running', 'fa-solid fa-clock',        'Çalışıyor');
  addSection(idle,    'lbl-idle',    'fa-regular fa-clock',      'Bekliyor');

  tasks.filter(t => t.timerState === 'running').forEach(t => {
    if (!intervals[t.id]) startTick(t.id);
  });
}

// ── BUILD ITEM ────────────────────────────────────────────────────────
function buildItem(task) {
  const state = task.timerState || 'idle';
  const card  = document.createElement('div');
  card.className = `task-item state-${state}`;
  card.dataset.id = task.id;

  /* ── TOP ROW: timer | title | pencil ── */
  const topRow = document.createElement('div');
  topRow.className = 'task-top';

  // Timer button — sadece ikon, yuvarlak
  const timerBtn = document.createElement('button');
  timerBtn.className = `btn-timer ${state}`;
  timerBtn.dataset.id = task.id;
  if (state === 'idle') {
    timerBtn.title = 'Sayacı Başlat (5 saat)';
    timerBtn.innerHTML = `<i class="fa-regular fa-clock"></i>`;
  } else if (state === 'running') {
    timerBtn.title = 'Çalışıyor…';
    timerBtn.innerHTML = `<i class="fa-solid fa-clock"></i>`;
  } else {
    timerBtn.title = 'Tekrar Başlat';
    timerBtn.innerHTML = `<i class="fa-solid fa-rotate-right"></i>`;
  }
  timerBtn.addEventListener('click', () => handleTimer(task.id));

  // Title wrap (başlık + countdown yan yana)
  const titleWrap = document.createElement('div');
  titleWrap.className = 'task-title-wrap';
  titleWrap.style.display = 'flex';
  titleWrap.style.alignItems = 'center';
  titleWrap.style.gap = '8px';
  titleWrap.style.minWidth = '0';

  const titleEl = document.createElement('div');
  titleEl.className = `task-title${state === 'done' ? ' done' : ''}`;
  titleEl.style.flex = '1';
  titleEl.style.minWidth = '0';
  titleEl.textContent = task.text;
  titleWrap.appendChild(titleEl);

  // Countdown metni — sadece running/done durumunda göster
  if (state === 'running' || state === 'done') {
    const cdEl = document.createElement('span');
    cdEl.className = `task-countdown${state === 'done' ? ' done' : ''}`;
    cdEl.dataset.id = task.id;
    if (state === 'running') {
      cdEl.textContent = fmtTime(computeRemaining(task));
    } else {
      cdEl.textContent = '✓ Bitti';
    }
    titleWrap.appendChild(cdEl);
  }

  // Pencil button (title edit)
  const pencilBtn = document.createElement('button');
  pencilBtn.className = 'btn-title-edit';
  pencilBtn.title = 'Başlığı düzenle';
  pencilBtn.innerHTML = `<i class="fa-solid fa-pen"></i>`;
  pencilBtn.addEventListener('click', () => startTitleEdit(task.id, card, titleWrap, titleEl, pencilBtn));

  topRow.appendChild(timerBtn);
  topRow.appendChild(titleWrap);
  topRow.appendChild(pencilBtn);

  /* ── BOTTOM ROW: note-input | save-btn | delete-btn ── */
  const botRow = document.createElement('div');
  botRow.className = 'task-bottom';

  const noteInput = document.createElement('input');
  noteInput.type        = 'text';
  noteInput.className   = 'note-input';
  noteInput.placeholder = 'Not ekle…';
  noteInput.maxLength   = 200;
  noteInput.value       = task.note || '';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-icon note-save';
  saveBtn.title     = 'Notu kaydet';
  saveBtn.innerHTML = `<i class="fa-solid fa-floppy-disk"></i>`;

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-icon del';
  delBtn.title     = 'Görevi sil';
  delBtn.innerHTML = `<i class="fa-solid fa-trash-can"></i>`;
  delBtn.addEventListener('click', () => deleteTask(task.id));

  // dirty tracking: note değişince kaydet butonu aktif
  noteInput.addEventListener('input', () => {
    const changed = noteInput.value !== (task.note || '');
    noteInput.classList.toggle('dirty', changed);
    saveBtn.classList.toggle('dirty', changed);
    saveBtn.classList.remove('saved');
  });

  // kaydet
  function saveNote() {
    task.note = noteInput.value;
    saveTasks();
    noteInput.classList.remove('dirty');
    saveBtn.classList.remove('dirty');
    saveBtn.classList.add('saved');
    // 1.5s sonra saved görünümü geri al
    setTimeout(() => saveBtn.classList.remove('saved'), 1500);
  }
  saveBtn.addEventListener('click', saveNote);
  noteInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveNote(); });

  botRow.appendChild(noteInput);
  botRow.appendChild(saveBtn);
  botRow.appendChild(delBtn);

  card.appendChild(topRow);
  card.appendChild(botRow);
  return card;
}

// ── TITLE EDIT ────────────────────────────────────────────────────────
function startTitleEdit(id, card, titleWrap, titleEl, pencilBtn) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;

  const input = document.createElement('input');
  input.type      = 'text';
  input.className = 'task-title-input';
  input.value     = task.text;
  input.maxLength = 120;
  titleWrap.replaceChild(input, titleEl);
  pencilBtn.style.display = 'none';

  input.focus();
  input.select();

  function save() {
    const val = input.value.trim();
    if (val) { task.text = val; saveTasks(); }
    pencilBtn.style.display = '';
    render();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { input.blur(); }
    if (e.key === 'Escape') { input.removeEventListener('blur', save); pencilBtn.style.display = ''; render(); }
  });
}

// ── TIMER LOGIC ───────────────────────────────────────────────────────
function handleTimer(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.timerState === 'running') return;

  stopTick(id);
  task.timerState   = 'running';
  task.remaining    = DURATION;
  task.startedAt    = Date.now();
  task.startedOrder = Date.now();
  saveTasks();
  startTick(id);
  render();
}

function startTick(id) {
  if (intervals[id]) return;
  intervals[id] = setInterval(() => tick(id), 1000);
}

function stopTick(id) {
  if (intervals[id]) { clearInterval(intervals[id]); delete intervals[id]; }
}

function tick(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) { stopTick(id); return; }

  const rem = computeRemaining(task);

  if (rem <= 0) {
    task.timerState = 'done';
    task.remaining  = 0;
    task.startedAt  = null;
    stopTick(id);
    saveTasks();
    render();
    showToast(`✅ "${task.text.slice(0,28)}" — süre doldu!`);
    vibrate();
    return;
  }

  const cd = document.querySelector(`.task-countdown[data-id="${id}"]`);
  if (cd) cd.textContent = fmtTime(rem);

  if (rem % 10 === 0) {
    task.remaining = rem;
    task.startedAt = Date.now();
    saveTasks();
  }
}

// ── ADD / DELETE ──────────────────────────────────────────────────────
function addTask() {
  const input = document.getElementById('taskInput');
  const text  = input.value.trim();
  if (!text) { input.focus(); return; }
  tasks.push({
    id: genId(),
    text,
    note: '',
    timerState: 'idle',
    remaining:  DURATION,
    startedAt:  null,
    addedAt:    Date.now()
  });
  saveTasks();
  input.value = '';
  render();
  input.focus();
}

function deleteTask(id) {
  stopTick(id);
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────
document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

tasks.forEach(task => {
  if (!task.addedAt) task.addedAt = 0;
  if (!task.note) task.note = '';
  if (task.timerState === 'running') {
    const rem = computeRemaining(task);
    if (rem <= 0) {
      task.timerState = 'done';
      task.remaining  = 0;
      task.startedAt  = null;
    } else {
      task.remaining = rem;
      task.startedAt = Date.now();
    }
  }
});
saveTasks();
render();
</script>
</body>
</html>
